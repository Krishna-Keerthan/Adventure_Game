services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: adventure_game
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/adventure_game
      DEBUG: "False"
      ALLOWED_ORIGINS: "http://localhost:3000"
    env_file:
      - .env

volumes:
  postgres_data: